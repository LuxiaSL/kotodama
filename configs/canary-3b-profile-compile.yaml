# Profile run — 3B, with compile, torch.profiler for fused kernel breakdown
model_size: 3b
sequence_length: 4096
micro_batch_size: 4
global_batch_tokens: 2097152

total_steps: 80
warmup_steps: 30
decay_start_pct: 0.95
decay_type: cosine

muon_lr: 0.02
muon_momentum: 0.95
muon_weight_decay: 0.01
muon_ns_iterations: 5
muon_ns_coefficients: gram_ns
adamw_lr: 6e-4
adamw_beta1: 0.9
adamw_beta2: 0.95
adamw_weight_decay: 0.1
gradient_clip: 1.0

attn_res: true
attn_res_n_blocks: 8

random_data: true
seed: 42

checkpoint_dir: checkpoints/profile-compile
save_every: 999999
keep_checkpoints: 1

fp8: true
use_liger: true
attn_impl: auto
compile: true
activation_checkpointing: true

profile: true
profile_start_step: 50
profile_steps: 20

log_every: 10
wandb: false
