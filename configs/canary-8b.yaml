# Canary throughput benchmark — 8B model (Llama 3.1-8B shape, our vocab)
# d=4096, L=32, 32Q/8KV (4:1 GQA), hdim=128, inter=14336 — ~7.2B params
# Measures steady-state tok/s with AttnRes, async checkpoints, compile, Liger.
# Usage: torchrun --nproc_per_node=8 -m src.training.train --config configs/canary-8b.yaml

model_size: 8b
sequence_length: 4096
micro_batch_size: 2
global_batch_tokens: 2097152

# 5k steps for steady-state measurement
total_steps: 5000
warmup_steps: 200
decay_start_pct: 0.95
decay_type: cosine

# Optimizer
muon_lr: 0.02
muon_momentum: 0.95
muon_weight_decay: 0.01
muon_ns_iterations: 5
muon_ns_coefficients: gram_ns
adamw_lr: 6e-4
adamw_beta1: 0.9
adamw_beta2: 0.95
adamw_weight_decay: 0.1
gradient_clip: 1.0

# AttnRes: 8 uniform blocks (clean: 32 layers / 8 = blocks of 4)
attn_res: true
attn_res_n_blocks: 8

# Data
random_data: true
seed: 42

# Checkpointing — async, save every 500 steps to measure overhead
checkpoint_dir: checkpoints/canary-8b
save_every: 500
keep_checkpoints: 3
async_checkpoint: true

# Optimizations
use_liger: true
attn_impl: auto
compile: true
activation_checkpointing: true

# Logging
log_every: 10
wandb: false
